<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Package Details – Sri Balaji Travels</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/package.css">
</head>
<body>

<!-- TOP BAR -->
<section class="top-bar">
    <div class="container">
        <div class="top-left">
            <span>+91 123456789</span>
            <span>info@travel.com</span>
        </div>
    </div>
</section>

<!-- NAVBAR -->
<header class="navbar">
    <div class="container">
        <div class="logo"><h2>Sri Balaji Travels</h2></div>
        <div class="menu-toggle">☰</div>
        <nav class="nav-menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="tirupathi.html#packages">Packages</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </div>
</header>

<!-- PACKAGE DETAIL — injected by JS -->
<main id="packageDetail">
    <div class="pkg-loading">
        <div class="pkg-loading-spinner"></div>
        <p>Loading package details…</p>
    </div>
</main>

<!-- RELATED PACKAGES -->
<section class="related-section" id="relatedSection" style="display:none;">
    <div class="container">
        <div class="section-header">
            <h2 class="packages-title">You May Also Like</h2>
        </div>
        <div class="package-detailed" id="relatedCards"></div>
    </div>
</section>

<!-- WHATSAPP FLOAT -->
<a href="https://wa.me/919876543210" class="whatsapp-float" target="_blank">💬</a>

<script src="js/packages-data.js"></script>
<script src="js/script.js"></script>
<script>
(function() {
    // ── 1. Get package id from URL ─────────────────────
    const params = new URLSearchParams(window.location.search);
    const id     = params.get("id");
    const pkg    = PACKAGES.find(p => p.id === id);
    const detail = document.getElementById("packageDetail");

    if (!pkg) {
        detail.innerHTML = `
            <div class="pkg-error">
                <h2>Package Not Found</h2>
                <p>We couldn't find this package. Please go back and choose from our available options.</p>
                <a href="tirupathi.html#packages" class="btn btn-primary">Browse Packages</a>
            </div>`;
        return;
    }

    // ── 2. Update page title ───────────────────────────
    document.title = pkg.name + " – Sri Balaji Travels";

    // ── 3. Build route breadcrumb ──────────────────────
    const routeHTML = pkg.routeFull.map((stop, i) =>
        `<span class="route-stop">${stop}</span>${i < pkg.routeFull.length - 1 ? '<span class="route-arrow">→</span>' : ''}`
    ).join('');

    // ── 4. Build includes / excludes ──────────────────
    const includesHTML = pkg.includes.map(i => `<li><span class="inc-icon">✓</span> ${i}</li>`).join('');
    const excludesHTML = pkg.excludes.map(e => `<li><span class="exc-icon">✗</span> ${e}</li>`).join('');

    // ── 5. Build highlights ───────────────────────────
    const highlightsHTML = pkg.highlights.map(h => `<div class="hl-chip">${h}</div>`).join('');

    // ── 6. Render full detail ─────────────────────────
    detail.innerHTML = `
        <!-- BREADCRUMB -->
        <div class="pkg-breadcrumb">
            <div class="container">
                <a href="index.html">Home</a>
                <span>›</span>
                <a href="tirupathi.html#packages">Packages</a>
                <span>›</span>
                <span>${pkg.name}</span>
            </div>
        </div>

        <!-- HERO STRIP -->
        <div class="pkg-hero-strip">
            <div class="pkg-hero-img">
                <img src="${pkg.image}" alt="${pkg.name}">
                <div class="pkg-hero-overlay"></div>
            </div>
            <div class="container pkg-hero-content">
                <span class="pkg-hero-tag ${pkg.tagClass || ''}">${pkg.tag}</span>
                <h1 class="pkg-title">${pkg.name}</h1>
                <div class="pkg-route-strip">${routeHTML}</div>
                <div class="pkg-hero-meta">
                    <span>⏱ ${pkg.duration}</span>
                    <span>🚗 Pickup & Drop Included</span>
                    <span>📞 24/7 Support</span>
                </div>
            </div>
        </div>

        <!-- MAIN BODY -->
        <div class="container pkg-body">

            <!-- LEFT COLUMN -->
            <div class="pkg-left">

                <!-- DESCRIPTION -->
                <div class="pkg-section">
                    <h2 class="pkg-section-title">About This Package</h2>
                    <p class="pkg-description">${pkg.description}</p>
                    ${pkg.note ? `<div class="pkg-note">💡 ${pkg.note}</div>` : ''}
                </div>

                <!-- HIGHLIGHTS -->
                <div class="pkg-section">
                    <h2 class="pkg-section-title">Highlights</h2>
                    <div class="pkg-highlights">${highlightsHTML}</div>
                </div>

                <!-- FULL ROUTE -->
                <div class="pkg-section">
                    <h2 class="pkg-section-title">Route</h2>
                    <div class="pkg-route-full">
                        ${pkg.routeFull.map((stop, i) => `
                            <div class="route-step">
                                <div class="route-dot ${i === 0 || i === pkg.routeFull.length - 1 ? 'route-dot-end' : ''}"></div>
                                <span>${stop}</span>
                            </div>
                            ${i < pkg.routeFull.length - 1 ? '<div class="route-line"></div>' : ''}
                        `).join('')}
                    </div>
                </div>

                <!-- INCLUDES / EXCLUDES -->
                <div class="pkg-section pkg-inc-exc">
                    <div class="pkg-inc">
                        <h2 class="pkg-section-title">What's Included</h2>
                        <ul>${includesHTML}</ul>
                    </div>
                    <div class="pkg-exc">
                        <h2 class="pkg-section-title">Not Included</h2>
                        <ul>${excludesHTML}</ul>
                    </div>
                </div>

            </div>

            <!-- RIGHT COLUMN — BOOKING CARD -->
            <div class="pkg-right">
                <div class="pkg-book-card">
                    <div class="pkg-price-block">
                        <span class="pkg-price-label">Starting from</span>
                        <span class="pkg-price-value">₹${pkg.price.toLocaleString('en-IN')}</span>
                        <span class="pkg-price-sub">per cab · ${pkg.duration}</span>
                    </div>

                    <div class="pkg-book-divider"></div>

                    <ul class="pkg-quick-facts">
                        <li><span>Duration</span><strong>${pkg.duration}</strong></li>
                        <li><span>Pickup</span><strong>Your Location</strong></li>
                        <li><span>Vehicle</span><strong>4 / 7 Seater</strong></li>
                        <li><span>Support</span><strong>24/7 Available</strong></li>
                    </ul>

                    <a href="booking.html?package=${pkg.id}" class="btn-book-pkg">
                        Book This Package
                    </a>

                    <a href="https://wa.me/919876543210?text=Hi, I'm interested in the ${encodeURIComponent(pkg.name)} package (₹${pkg.price})" 
                       target="_blank" class="btn-whatsapp-pkg">
                        💬 Ask on WhatsApp
                    </a>

                    <p class="pkg-book-note">📞 Our team will call you within 15 minutes of booking</p>
                </div>
            </div>

        </div>
    `;

    // ── 7. Related packages ────────────────────────────
    const related = PACKAGES
        .filter(p => p.id !== pkg.id && (p.category === pkg.category || p.popular))
        .slice(0, 3);

    if (related.length) {
        document.getElementById("relatedSection").style.display = "block";
        document.getElementById("relatedCards").innerHTML = related.map(p => `
            <div class="package-full-card ${p.tagClass === 'tag-premium' ? 'highlight' : ''}">
                <div class="package-top">
                    <img src="${p.image}" alt="${p.name}">
                    <div>
                        <span class="pkg-tag ${p.tagClass || ''}">${p.tag}</span>
                        <h3>${p.name}</h3>
                        <p class="package-desc">${p.routeShort}</p>
                    </div>
                </div>
                <ul>${p.highlights.slice(0,3).map(h => `<li>${h}</li>`).join('')}</ul>
                <div class="price-row">
                    <span class="new-price">₹${p.price.toLocaleString('en-IN')}</span>
                    <span class="pkg-duration">${p.duration}</span>
                </div>
                <a href="package.html?id=${p.id}" class="btn btn-primary">View Details</a>
            </div>
        `).join('');
    }
})();
</script>

</body>
</html>
