<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Book Your Tirupati Trip</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/booking.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

<section class="booking-section">

    <div class="overlay"></div>

    <div class="container booking-container">

        <!-- LEFT -->
        <div class="booking-left">
            <h1>Plan Your Tirupati Journey</h1>

            <p>
                Simple booking. Quick confirmation. Peaceful darshan experience.
            </p>

            <div class="booking-points">
                <span>✔ Trusted Travel Partner</span>
                <span>✔ Comfortable Cab Service</span>
                <span>✔ Flexible Packages</span>
            </div>

            <div class="booking-call">
                📞 +91 98765 43210
            </div>
        </div>

        <!-- FORM -->
        <div class="booking-form-box">

            <h2>Book Now</h2>

            <form id="bookingForm">

                <div class="form-group">
                    <input type="text" id="name" placeholder="Full Name" required>
                </div>

                <!-- PHONE WITH +91 -->
                <div class="form-group phone-group">
                    <span class="country-code">+91</span>
                    <input type="tel" id="phone" placeholder="Enter 10 digit number" maxlength="10" required>
                </div>

                <div class="form-group">
                    <input type="email" id="email" placeholder="Email (Optional)">
                </div>

                <div class="form-group">
                    <select id="trip" required>
                        <option value="">Select Trip</option>
                        <option>Tirumala Visit</option>
                        <option>Tirupati + Tirumala</option>
                        <option>Complete Package</option>
                        <option>Custom Trip</option>
                    </select>
                </div>

                <div class="form-group">
                    <input type="date" id="date" required>
                </div>

                <div class="form-group">
                    <select id="people" required>
                        <option value="">Number of People</option>
                        <option>1-2</option>
                        <option>3-5</option>
                        <option>6-7</option>
                        <option>8+</option>
                    </select>
                </div>

                <div class="form-group">
                    <input type="text" id="pickup" placeholder="Pickup Location" required>
                </div>

                <div class="form-group check-group">
                    <label class="check-label">
                        <input type="checkbox" id="stay">
                        <span>Need Accommodation</span>
                    </label>
                </div>

                <div class="form-group">
                    <textarea id="notes" placeholder="Additional Notes (Optional)"></textarea>
                </div>

                <button type="submit" class="btn-book">
                    Confirm Booking
                </button>

                <p class="form-success" id="successMsg">
                    ✅ Our team will contact you within 10 minutes
                </p>

                <p class="trust-note">
                    🔒 Your details are safe & confidential
                </p>

            </form>

        </div>

    </div>
</section>

<!-- WHATSAPP FLOAT -->
<a href="https://wa.me/919876543210" class="whatsapp-float" target="_blank">
    💬
</a>

<script src="js/script.js"></script>

<script>
const form = document.getElementById("bookingForm");
const successMsg = document.getElementById("successMsg");

// default date
document.getElementById("date").valueAsDate = new Date();

form.addEventListener("submit", function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;

    // ✅ VALIDATION
    if (phone.length !== 10 || isNaN(phone)) {
        alert("Enter valid 10-digit phone number");
        return;
    }

    const trip = document.getElementById("trip").value;
    const date = document.getElementById("date").value;
    const people = document.getElementById("people").value;
    const pickup = document.getElementById("pickup").value;
    const stay = document.getElementById("stay").checked ? "Yes" : "No";
    const notes = document.getElementById("notes").value;

    const message = `New Booking:
Name: ${name}
Phone: +91${phone}
Trip: ${trip}
Date: ${date}
People: ${people}
Pickup: ${pickup}
Stay: ${stay}
Notes: ${notes}`;

    window.open(`https://wa.me/919876543210?text=${encodeURIComponent(message)}`, "_blank");

    successMsg.style.display = "block";
    form.reset();
});
</script>

</body>
</html>
