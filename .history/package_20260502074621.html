<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Package Details – Yatrahere</title>

<link rel="stylesheet" href="css/style.css">

<style>

/* ================================
   HERO (SINGLE IMAGE ONLY)
================================ */
.pkg-hero {
    position: relative;
    height: 320px;
    overflow: hidden;
}

.pkg-hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* subtle overlay (NOT black heavy) */
.pkg-hero-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.25); /* light */
}

/* price badge - subtle */
.pkg-price-badge {
    position: absolute;
    bottom: 15px;
    right: 15px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(6px);
    padding: 10px 14px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 16px;
}

/* ================================
   CONTENT
================================ */
.pkg-container {
    padding: 25px 15px;
}

.pkg-title {
    font-size: 26px;
    margin-bottom: 8px;
}

.pkg-desc {
    color: #666;
    margin-bottom: 15px;
}

/* ================================
   BUTTONS (REDUCED MOBILE SIZE)
================================ */
.pkg-actions {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.pkg-btn {
    padding: 10px 16px;
    font-size: 14px;
    border-radius: 8px;
}

/* mobile smaller */
@media(max-width:768px){
    .pkg-btn {
        padding: 9px 12px;
        font-size: 13px;
    }
}

/* ================================
   YOU MAY ALSO LIKE
================================ */
.related-section {
    padding: 30px 0;
}

.related-card {
    width: 260px;
    flex-shrink: 0;
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.related-card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
}

.related-body {
    padding: 12px;
}

.related-body h3 {
    font-size: 16px;
    margin-bottom: 6px;
}

.related-price {
    font-weight: 600;
    color: #d4af37;
}

.related-track {
    display: flex;
    gap: 15px;
    overflow-x: auto;
    padding: 10px 15px;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="pkg-hero" id="pkgHero">
    <img id="pkgImage" src="" alt="">
    <div class="pkg-hero-overlay"></div>
    <div class="pkg-price-badge" id="pkgPrice">₹0</div>
</div>

<!-- CONTENT -->
<div class="pkg-container" id="pkgContent"></div>

<!-- RELATED -->
<section class="related-section">
    <h2 style="padding-left:15px;">You May Also Like</h2>
    <div class="related-track" id="relatedCards"></div>
</section>

<script src="js/packages-data.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const pkgId = params.get("id");
const pkg = PACKAGES.find(p => p.id === pkgId);

/* ===== MAIN PACKAGE ===== */
if(pkg){

    document.getElementById("pkgImage").src = pkg.cardImage;
    document.getElementById("pkgPrice").innerText = "₹" + pkg.price;

    document.getElementById("pkgContent").innerHTML = `
        <h1 class="pkg-title">${pkg.name}</h1>
        <p class="pkg-desc">${pkg.description}</p>

        <div class="pkg-actions">
            <a href="booking.html?package=${pkg.id}" class="btn btn-primary pkg-btn">Book Now</a>
            <a href="https://wa.me/918639429948" class="btn btn-outline pkg-btn">WhatsApp</a>
        </div>
    `;
}

/* ===== RELATED (SINGLE IMAGE ONLY) ===== */
const related = PACKAGES
    .filter(p => p.id !== pkgId)
    .slice(0,5);

document.getElementById("relatedCards").innerHTML = related.map(p => `
    <a href="package.html?id=${p.id}" class="related-card">
        <img src="${p.cardImage}" alt="${p.name}">
        <div class="related-body">
            <h3>${p.name}</h3>
            <span class="related-price">₹${p.price}</span>
        </div>
    </a>
`).join("");
</script>

</body>
</html>
